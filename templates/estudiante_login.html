<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Estudiante - RENOVA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #0f172a,
            #1e3a8a,
            #2563eb
            );

            overflow:hidden;

            font-family:Arial, Helvetica, sans-serif;
        }

        .blur{

            position:absolute;

            width:700px;
            height:700px;

            background:rgba(255,255,255,0.08);

            border-radius:50%;

            filter:blur(120px);

            top:-200px;
            right:-200px;
        }

        .login-card{

            width:500px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:35px;

            padding:50px;

            box-shadow:0px 20px 50px rgba(0,0,0,0.3);

            position:relative;

            z-index:10;
        }

        .logo{

            text-align:center;

            margin-bottom:35px;
        }

        .logo h1{

            color:white;

            font-size:55px;

            font-weight:bold;

            letter-spacing:4px;
        }

        .logo p{

            color:#dbeafe;

            font-size:20px;

            margin-top:10px;
        }

        .icon-user{

            width:120px;
            height:120px;

            background:rgba(255,255,255,0.1);

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;
            margin-bottom:30px;
        }

        .icon-user i{

            color:white;

            font-size:55px;
        }

        .form-control{

            height:65px;

            border:none;

            border-radius:18px;

            background:rgba(255,255,255,0.08);

            color:white;

            font-size:20px;

            margin-bottom:22px;
        }

        .form-control::placeholder{

            color:#dbeafe;
        }

        .form-control:focus{

            background:rgba(255,255,255,0.12);

            color:white;

            box-shadow:none;
        }

        .btn-login{

            width:100%;

            height:65px;

            border:none;

            border-radius:18px;

            background:#2563eb;

            color:white;

            font-size:22px;

            font-weight:bold;

            transition:0.3s;
        }

        .btn-login:hover{

            background:#1d4ed8;

            transform:translateY(-3px);
        }

        .back{

            display:block;

            text-align:center;

            color:#dbeafe;

            margin-top:25px;

            text-decoration:none;

            font-size:18px;
        }

        .back:hover{

            color:white;
        }

        .error{

            background:#dc2626;

            color:white;

            padding:15px;

            border-radius:15px;

            text-align:center;

            margin-bottom:20px;

            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="blur"></div>

<div class="login-card">

    <div class="logo">

        <h1>RENOVA</h1>

        <p>
            Acceso para estudiantes
        </p>

    </div>

    <div class="icon-user">

        <i class="fa-solid fa-user-graduate"></i>

    </div>

    {% if error %}

    <div class="error">
        {{ error }}
    </div>

    {% endif %}

    <form method="POST">

        <input
            type="email"
            name="correo"
            class="form-control"
            placeholder="Correo institucional"
            required
        >

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Contraseña"
            required
        >

        <button class="btn-login">

            <i class="fa-solid fa-right-to-bracket"></i>

            Ingresar

        </button>

    </form>

    <a href="/login" class="back">

        <i class="fa-solid fa-arrow-left"></i>

        Volver al inicio

    </a>

</div>

</body>
</html>
