<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RENOVA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            135deg,
            #1e3a8a,
            #2563eb,
            #60a5fa
            );

            font-family:Arial, Helvetica, sans-serif;
            overflow:hidden;
        }

        .background-blur{

            position:absolute;
            width:700px;
            height:700px;

            background:rgba(255,255,255,0.08);

            border-radius:50%;

            filter:blur(120px);

            top:-200px;
            right:-200px;

        }

        .login-container{

            width:1100px;
            min-height:650px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.15);

            border-radius:35px;

            display:grid;
            grid-template-columns:1fr 1fr;

            overflow:hidden;

            box-shadow:0px 20px 50px rgba(0,0,0,0.25);

            z-index:10;
        }

        .left{

            padding:70px 60px;
            color:white;

            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left h1{

            font-size:70px;
            font-weight:bold;
            margin-bottom:20px;
            letter-spacing:4px;
        }

        .left p{

            font-size:24px;
            line-height:1.7;
            opacity:0.95;
        }

        .features{

            margin-top:40px;
        }

        .features div{

            display:flex;
            align-items:center;
            gap:15px;

            margin-bottom:20px;

            font-size:22px;
        }

        .features i{

            font-size:28px;
        }

        .right{

            background:rgba(15,23,42,0.88);

            padding:60px;

            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .tabs{

            display:flex;
            gap:15px;
            margin-bottom:35px;
        }

        .tab-btn{

            flex:1;

            border:none;

            height:60px;

            border-radius:18px;

            background:rgba(255,255,255,0.08);

            color:white;

            font-size:18px;
            font-weight:bold;

            transition:0.3s;
        }

        .tab-btn:hover{

            background:#2563eb;
        }

        .active{

            background:#2563eb;
        }

        .login-box h2{

            color:white;

            font-size:38px;

            margin-bottom:30px;

            font-weight:bold;
        }

        .form-control{

            height:65px;

            border:none;

            border-radius:18px;

            background:rgba(255,255,255,0.08);

            color:white;

            font-size:20px;

            margin-bottom:22px;
        }

        .form-control::placeholder{

            color:#dbeafe;
        }

        .form-control:focus{

            background:rgba(255,255,255,0.12);

            color:white;

            box-shadow:none;
        }

        .btn-login{

            width:100%;

            height:65px;

            border:none;

            border-radius:18px;

            background:#2563eb;

            color:white;

            font-size:22px;

            font-weight:bold;

            transition:0.3s;
        }

        .btn-login:hover{

            background:#1d4ed8;

            transform:translateY(-3px);
        }

        .error{

            background:#dc2626;

            color:white;

            padding:15px;

            border-radius:15px;

            margin-bottom:20px;

            text-align:center;

            font-weight:bold;
        }

        @media(max-width:1000px){

            .login-container{

                grid-template-columns:1fr;
                width:95%;
            }

            .left{

                display:none;
            }

        }

    </style>

</head>
<body>

<div class="background-blur"></div>

<div class="login-container">

    <!-- IZQUIERDA -->

    <div class="left">

        <h1>RENOVA</h1>

        <p>
            Plataforma académica universitaria moderna para docentes y estudiantes.
        </p>

        <div class="features">

            <div>
                <i class="fa-solid fa-book-open"></i>
                Gestión académica inteligente
            </div>

            <div>
                <i class="fa-solid fa-users"></i>
                Paneles para docentes y estudiantes
            </div>

            <div>
                <i class="fa-solid fa-file-arrow-up"></i>
                Subida de contenidos académicos
            </div>

            <div>
                <i class="fa-solid fa-chart-line"></i>
                Experiencia universitaria moderna
            </div>

        </div>

    </div>

    <!-- DERECHA -->

    <div class="right">

        <div class="tabs">

            <button class="tab-btn active">
                Admin
            </button>

            <button class="tab-btn"
            onclick="window.location.href='/docente_login'">
                Docente
            </button>

            <button class="tab-btn"
            onclick="window.location.href='/estudiante_login'">
                Estudiante
            </button>

        </div>

        <div class="login-box">

            <h2>
                Iniciar Sesión
            </h2>

            {% if error %}

            <div class="error">
                {{ error }}
            </div>

            {% endif %}

            <form method="POST">

                <input
                    type="text"
                    name="usuario"
                    class="form-control"
                    placeholder="Usuario administrador"
                    required
                >

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Contraseña"
                    required
                >

                <button class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Ingresar
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
